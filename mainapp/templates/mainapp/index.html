<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Django 網站</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4183cf 0%, #6c5ce7 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            padding: 36px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 2.8rem;
            letter-spacing: 0.03em;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin: 16px 0;
        }
        .tag {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.24);
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>歡迎來到我的 Django 網站</h1>
        <p>這是我的第一個 Django 網站，現在已經改成更好看的樣式了。</p>
        <p>我是 B11113027 謝秉修，這個頁面會顯示在你的首頁。</p>
        <div class="tag">Django + HTML + CSS</div>
    </div>
</body>
</html>
